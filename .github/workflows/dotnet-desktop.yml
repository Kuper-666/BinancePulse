name: .NET Desktop Build and Release

on:
  push:
    tags:
      - 'v*' # Триггер: создание тега (v1.0.0, v2.3.5, ...)
  workflow_dispatch: # Триггер: ручной запуск из интерфейса GitHub

env:
  PROJECT_PATH: 'BinancePulse.csproj' # Путь к вашему файлу проекта (.csproj)

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Права на запись для создания релиза

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Версия .NET

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build the application
      run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

    - name: Publish as single file
      run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Create archive
      run: Compress-Archive -Path ./publish/* -DestinationPath BinancePulse_v${{ github.ref_name }}.zip

    - name: Create GitHub Release and upload asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: Автоматически созданный релиз для версии ${{ github.ref_name }}.
        files: BinancePulse_v${{ github.ref_name }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
