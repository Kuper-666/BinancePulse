name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # 1. Пре-релиз при пуше в master
  # ============================================================
  build-prerelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $tag = "v${{ steps.gitversion.outputs.semVer }}"
          $exists = git tag -l $tag
          if (-not $exists) {
            git tag $tag
            git push origin $tag
            Write-Host "✅ Tag $tag created"
          } else {
            Write-Host "⚠️ Tag $tag already exists, skipping"
          }
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BinancePulse/BinancePulse.csproj

      - name: Build
        run: dotnet build BinancePulse/BinancePulse.csproj -c Release --no-restore -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Publish (single file)
        run: dotnet publish BinancePulse/BinancePulse.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.gitversion.outputs.semVer }} -o ./publish

      - name: Create ZIP archive
        run: Compress-Archive -Path .\publish\* -DestinationPath BinancePulse_v${{ steps.gitversion.outputs.semVer }}.zip

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: powershell

      - name: Build installer
        run: |
          $issPath = ""
          if (Test-Path "BinancePulse/installer.iss") {
            $issPath = "BinancePulse/installer.iss"
          } elseif (Test-Path "installer.iss") {
            $issPath = "installer.iss"
          } else {
            Write-Host "❌ installer.iss not found!"
            exit 1
          }
          Write-Host "✅ Using installer script: $issPath"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.gitversion.outputs.semVer }}" $issPath
        shell: powershell

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          name: Pre-Release v${{ steps.gitversion.outputs.semVer }}
          body: |
            Автоматический пре-релиз v${{ steps.gitversion.outputs.semVer }}.
            Сборка из последнего коммита в master.
          files: |
            BinancePulse_v${{ steps.gitversion.outputs.semVer }}.zip
            Installers/BinancePulse_Setup.exe
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 2. Стабильный релиз при пуше тега v*
  # ============================================================
  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BinancePulse/BinancePulse.csproj

      - name: Build
        run: dotnet build BinancePulse/BinancePulse.csproj -c Release --no-restore -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Publish (single file)
        run: dotnet publish BinancePulse/BinancePulse.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false -p:Version=${{ steps.gitversion.outputs.semVer }} -o ./publish

      - name: Create ZIP archive
        run: Compress-Archive -Path .\publish\* -DestinationPath BinancePulse_v${{ steps.gitversion.outputs.semVer }}.zip

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: powershell

      - name: Build installer
        run: |
          $issPath = ""
          if (Test-Path "BinancePulse/installer.iss") {
            $issPath = "BinancePulse/installer.iss"
          } elseif (Test-Path "installer.iss") {
            $issPath = "installer.iss"
          } else {
            Write-Host "❌ installer.iss not found!"
            exit 1
          }
          Write-Host "✅ Using installer script: $issPath"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.gitversion.outputs.semVer }}" $issPath
        shell: powershell

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Стабильный релиз ${{ github.ref_name }}.
          files: |
            BinancePulse_v${{ steps.gitversion.outputs.semVer }}.zip
            Installers/BinancePulse_Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
