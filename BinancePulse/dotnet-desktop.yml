name: .NET Desktop Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Find .csproj file
      id: find
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($proj) {
          Write-Host "Found project: $($proj.FullName)"
          echo "PROJECT_PATH=$($proj.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PROJECT_DIR=$($proj.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
          Write-Error "No .csproj file found"
          exit 1
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore "${{ env.PROJECT_PATH }}"

    - name: Build
      run: dotnet build "${{ env.PROJECT_PATH }}" -c Release --no-restore

    - name: Publish as single file
      run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Create archive
      run: Compress-Archive -Path ./publish/* -DestinationPath BinancePulse_v${{ github.ref_name }}.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: Автоматически созданный релиз для версии ${{ github.ref_name }}.
        files: BinancePulse_v${{ github.ref_name }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
